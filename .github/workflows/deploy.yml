name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SITE_URL: ${{ secrets.SITE_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r shared deploy/
          cp -r services deploy/
          cp package*.json deploy/
          cp ecosystem.config.cjs deploy/
          cp docker-compose.vps.yml deploy/
          cp scripts/deploy-vps-docker.sh deploy/
          cp scripts/run-blog-crawl-cron.sh deploy/
          cp scripts/install-blog-crawler-cron.sh deploy/
          chmod +x deploy/deploy-vps-docker.sh deploy/run-blog-crawl-cron.sh deploy/install-blog-crawler-cron.sh
          tar -czf software-hub.tar.gz -C deploy .

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: software-hub.tar.gz
          target: /tmp/
          strip_components: 0

      - name: Execute deployment on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            PROJECT_PATH="/var/www/software-hub"
            BACKUP_PATH="/var/www/software-hub-backup-$(date +%Y%m%d-%H%M%S)"

            mkdir -p "$PROJECT_PATH"

            if [ -d "$PROJECT_PATH/dist" ]; then
              echo "Creating backup..."
              cp -r "$PROJECT_PATH" "$BACKUP_PATH"
            fi

            cd "$PROJECT_PATH"
            tar -xzf /tmp/software-hub.tar.gz
            rm -f /tmp/software-hub.tar.gz

            if [ -n "${{ secrets.VPS_ENV_B64 }}" ]; then
              echo "Writing production .env from GitHub secret..."
              echo "${{ secrets.VPS_ENV_B64 }}" | base64 -d > .env
              chmod 600 .env
            elif [ ! -f .env ]; then
              echo "⚠️  No VPS_ENV_B64 secret and no .env — copy .env.vps.example manually"
            fi

            chmod +x deploy-vps-docker.sh
            ./deploy-vps-docker.sh

            ls -dt /var/www/software-hub-backup-* 2>/dev/null | tail -n +6 | xargs rm -rf || true
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 25
          echo "Checking https://swhubco.com/health ..."
          HEALTH="$(curl -sf "https://swhubco.com/health" || curl -sf "http://${{ secrets.SSH_HOST }}:5000/health")"
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"environment":"production"' || \
            (echo "❌ Expected production app (got dev/stale Docker on :5000?)" && exit 1)
          curl -sf "https://swhubco.com/og-default.png" -o /dev/null || \
            (echo "❌ Missing og-default.png — static assets may be stale" && exit 1)
          echo "$HEALTH" | grep -q '"supabaseAuth":true' || \
            (echo "❌ supabaseAuth:false — set SUPABASE_SERVICE_KEY in VPS .env (re-sync VPS_ENV_B64)" && exit 1)
          echo "$HEALTH" | grep -q '"supabaseAuthVerify":true' || \
            (echo "❌ supabaseAuthVerify:false — VPS SUPABASE_SERVICE_KEY is wrong (run scripts/sync-github-secrets.sh)" && exit 1)
