name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          # Copy built files (dist contains both client and server)
          cp -r dist deploy/
          # Copy shared code if needed at runtime
          cp -r shared deploy/
          # Copy services (microservices)
          cp -r services deploy/
          # Copy package files
          cp package*.json deploy/
          # Copy ecosystem config for PM2
          cp ecosystem.config.js deploy/
          # Copy Docker Compose for VPS
          cp docker-compose.vps.yml deploy/
          # Copy deployment script
          cp scripts/deploy-vps-docker.sh deploy/
          chmod +x deploy/deploy-vps-docker.sh
          # Create tarball
          tar -czf software-hub.tar.gz -C deploy .

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "software-hub.tar.gz"
          target: "/tmp/"
          debug: true
          strip_components: 0

      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          debug: true
          script: |
            set -e
            
            # Define paths
            PROJECT_PATH="/var/www/software-hub"
            BACKUP_PATH="/var/www/software-hub-backup-$(date +%Y%m%d-%H%M%S)"
            
            # Create project directory if it doesn't exist
            echo "Creating project directory..."
            mkdir -p $PROJECT_PATH
            
            # Backup current deployment
            if [ -d "$PROJECT_PATH/dist" ]; then
              echo "Creating backup..."
              cp -r $PROJECT_PATH $BACKUP_PATH
            fi
            
            # Extract new deployment
            echo "Extracting new deployment..."
            cd $PROJECT_PATH
            tar -xzf /tmp/software-hub.tar.gz
            rm /tmp/software-hub.tar.gz
            
            # Run deployment script
            echo "Running deployment script..."
            chmod +x deploy-vps-docker.sh
            ./deploy-vps-docker.sh
            
            # Keep only last 5 backups
            echo "Cleaning old backups..."
            ls -dt /var/www/software-hub-backup-* 2>/dev/null | tail -n +6 | xargs rm -rf || true
            
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          echo "Performing health check..."
          curl -f http://${{ secrets.SSH_HOST }} || curl -f http://${{ secrets.SSH_HOST }}:3000 || echo "Health check failed - please verify manually"
