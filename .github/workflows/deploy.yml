name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          # Copy built files
          cp -r dist deploy/
          cp -r server deploy/
          cp -r shared deploy/
          cp -r services deploy/
          cp package*.json deploy/
          cp tsconfig.json deploy/
          # Create tarball
          tar -czf software-hub.tar.gz -C deploy .

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "software-hub.tar.gz"
          target: "/tmp/"
          debug: true
          strip_components: 0

      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          debug: true
          script: |
            set -e
            
            # Define paths
            PROJECT_PATH="/root/Cuongtm2012"
            BACKUP_PATH="/root/software-hub-backup-$(date +%Y%m%d-%H%M%S)"
            
            # Create project directory if it doesn't exist
            echo "Creating project directory..."
            mkdir -p $PROJECT_PATH
            
            # Set proper permissions
            echo "Setting permissions..."
            chown -R root:root $PROJECT_PATH
            chmod -R 755 $PROJECT_PATH
            
            # Backup current deployment
            if [ -d "$PROJECT_PATH/dist" ]; then
              echo "Creating backup..."
              cp -r $PROJECT_PATH $BACKUP_PATH
            fi
            
            # Extract new deployment
            echo "Extracting new deployment..."
            cd $PROJECT_PATH
            tar -xzf /tmp/software-hub.tar.gz
            rm /tmp/software-hub.tar.gz
            
            # Install production dependencies
            echo "Installing production dependencies..."
            npm ci --production
            
            # Run database migrations
            echo "Running database migrations..."
            npm run db:migrate || echo "Migration failed or not configured"
            
            # Restart application with PM2
            echo "Restarting application..."
            if command -v pm2 &> /dev/null; then
              pm2 restart software-hub || pm2 start npm --name "software-hub" -- start
              pm2 save
            else
              echo "PM2 not found. Please install PM2 or configure your process manager."
              # Fallback: try to restart with systemd if configured
              systemctl restart software-hub || echo "No systemd service configured"
            fi
            
            # Keep only last 5 backups
            echo "Cleaning old backups..."
            ls -dt /root/software-hub-backup-* 2>/dev/null | tail -n +6 | xargs rm -rf || true
            
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          echo "Performing health check..."
          curl -f http://${{ secrets.SSH_HOST }} || curl -f http://${{ secrets.SSH_HOST }}:3000 || echo "Health check failed - please verify manually"
