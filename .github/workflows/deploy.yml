name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          # Copy built files
          cp -r dist deploy/
          cp -r server deploy/
          cp -r shared deploy/
          cp -r services deploy/
          cp package*.json deploy/
          cp tsconfig.json deploy/
          # Create tarball
          tar -czf software-hub.tar.gz -C deploy .

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "software-hub.tar.gz"
          target: "/tmp/"

      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            
            # Define paths
            PROJECT_PATH="/var/www/software-hub"
            BACKUP_PATH="/var/www/software-hub-backup-$(date +%Y%m%d-%H%M%S)"
            
            # Create project directory if it doesn't exist
            mkdir -p $PROJECT_PATH
            
            # Backup current deployment
            if [ -d "$PROJECT_PATH/dist" ]; then
              echo "Creating backup..."
              cp -r $PROJECT_PATH $BACKUP_PATH
            fi
            
            # Extract new deployment
            echo "Extracting new deployment..."
            cd $PROJECT_PATH
            tar -xzf /tmp/software-hub.tar.gz
            rm /tmp/software-hub.tar.gz
            
            # Install production dependencies
            echo "Installing production dependencies..."
            npm ci --production
            
            # Run database migrations
            echo "Running database migrations..."
            npm run db:migrate || echo "Migration failed or not configured"
            
            # Restart application
            echo "Restarting application..."
            bash /var/www/deploy.sh
            
            # Keep only last 5 backups
            ls -dt /var/www/software-hub-backup-* | tail -n +6 | xargs rm -rf || true
            
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.REMOTE_HOST }} || exit 1
