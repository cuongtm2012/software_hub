version: '3.8'

# VPS infrastructure — app chạy PM2 trên host (ecosystem.config.cjs)
# Database: Supabase (cloud) — KHÔNG cần Postgres container
# Chỉ Redis (queue) + MongoDB (chat service)

services:
  mongo:
    image: mongo:7
    container_name: softwarehub-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-softwarehub-chat}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - softwarehub-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: softwarehub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - softwarehub-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  softwarehub-network:
    driver: bridge
    name: softwarehub-network

volumes:
  mongo_data:
    driver: local
    name: softwarehub-mongo-data
  mongo_config:
    driver: local
    name: softwarehub-mongo-config
  redis_data:
    driver: local
    name: softwarehub-redis-data
